name: Deploy

on:
  push:
    branches: [main]

concurrency:
  group: deploy-production
  cancel-in-progress: false   # Never cancel an in-flight deploy

jobs:
  deploy:
    name: Build, push images & deploy
    runs-on: ubuntu-latest

    steps:
      # ── 1. Source ────────────────────────────────────────────────────────
      - name: Checkout repository
        uses: actions/checkout@v4

      # ── 2. Docker Buildx ─────────────────────────────────────────────────
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      # ── 3. Authenticate with Docker Hub ──────────────────────────────────
      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      # ── 4. Build & push backend image ────────────────────────────────────
      - name: Build and push backend image
        uses: docker/build-push-action@v5
        with:
          context: ./backend
          file: ./backend/Dockerfile
          push: true
          tags: |
            edusight/backend:latest
            edusight/backend:${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      # ── 5. Build & push frontend image ───────────────────────────────────
      - name: Build and push frontend image
        uses: docker/build-push-action@v5
        with:
          context: ./frontend
          file: ./frontend/Dockerfile
          push: true
          tags: |
            edusight/frontend:latest
            edusight/frontend:${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
          build-args: |
            NEXT_PUBLIC_API_URL=${{ vars.NEXT_PUBLIC_API_URL }}
            NEXTAUTH_URL=${{ vars.NEXTAUTH_URL }}

      # ── 6. Deploy to server via SSH ──────────────────────────────────────
      # Replace the echo commands below with your actual deployment mechanism
      # (e.g. appleboy/ssh-action, Ansible, kubectl rollout, etc.)
      - name: Deploy to production server
        env:
          IMAGE_TAG: ${{ github.sha }}
        run: |
          echo "=== EduSight Africa — Production Deployment ==="
          echo ""
          echo "Images pushed:"
          echo "  edusight/backend:${IMAGE_TAG}"
          echo "  edusight/frontend:${IMAGE_TAG}"
          echo ""
          echo "Commands to run on the production server:"
          echo ""
          echo "  # Pull updated images"
          echo "  docker pull edusight/backend:${IMAGE_TAG}"
          echo "  docker pull edusight/frontend:${IMAGE_TAG}"
          echo ""
          echo "  # Tag as latest locally"
          echo "  docker tag edusight/backend:${IMAGE_TAG} edusight/backend:latest"
          echo "  docker tag edusight/frontend:${IMAGE_TAG} edusight/frontend:latest"
          echo ""
          echo "  # Restart services (zero-downtime)"
          echo "  docker compose -f /opt/edusight/docker-compose.yml pull"
          echo "  docker compose -f /opt/edusight/docker-compose.yml up -d --no-deps backend frontend"
          echo ""
          echo "  # Run any pending migrations"
          echo "  docker compose -f /opt/edusight/docker-compose.yml exec backend alembic upgrade head"
          echo ""
          echo "=== Deployment script complete ==="

      # ── 7. Post-deploy health check (placeholder) ─────────────────────────
      - name: Post-deployment health check
        run: |
          echo "Health check placeholder."
          echo "Replace with: curl --fail https://api.edusight.africa/health"
          echo "Or integrate with your monitoring provider (Uptime Robot, Datadog, etc.)"
