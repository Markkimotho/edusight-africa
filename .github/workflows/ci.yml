name: CI

on:
  push:
    branches: ["**"]          # every branch
  pull_request:
    branches: [main]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  # ─────────────────────────────────────────────────────────────────────────
  # Job 1: Backend tests (Python 3.11, pytest + coverage)
  # ─────────────────────────────────────────────────────────────────────────
  backend-test:
    name: Backend — pytest
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_DB: edusight_test
          POSTGRES_USER: edusight
          POSTGRES_PASSWORD: edusight
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U edusight -d edusight_test"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

      redis:
        image: redis:7-alpine
        ports:
          - 6379:6379
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    defaults:
      run:
        working-directory: backend

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip
          cache-dependency-path: backend/requirements.txt

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install pytest pytest-cov pytest-asyncio httpx

      - name: Run tests with coverage
        env:
          DATABASE_URL: postgresql+asyncpg://edusight:edusight@localhost:5432/edusight_test
          REDIS_URL: redis://localhost:6379
          SECRET_KEY: ci-test-secret-key-at-least-32-characters
          REFRESH_SECRET_KEY: ci-test-refresh-secret-key-at-least-32-chars
          ENVIRONMENT: test
        run: |
          pytest tests/ \
            --cov=app \
            --cov-report=xml \
            --cov-report=term-missing \
            -v

      - name: Upload coverage report
        uses: codecov/codecov-action@v4
        with:
          files: backend/coverage.xml
          flags: backend
          fail_ci_if_error: false
        env:
          CODECOV_TOKEN: ${{ secrets.CODECOV_TOKEN }}

  # ─────────────────────────────────────────────────────────────────────────
  # Job 2: Frontend lint + type-check (Node 20)
  # ─────────────────────────────────────────────────────────────────────────
  frontend-lint:
    name: Frontend — lint & type-check
    runs-on: ubuntu-latest

    defaults:
      run:
        working-directory: frontend

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies (clean install)
        run: npm ci

      - name: Run ESLint
        run: npm run lint

      - name: Run TypeScript type-check
        run: npm run type-check

  # ─────────────────────────────────────────────────────────────────────────
  # Status gate — both jobs must pass before PRs to main can be merged
  # ─────────────────────────────────────────────────────────────────────────
  ci-gate:
    name: CI gate (all checks passed)
    needs: [backend-test, frontend-lint]
    runs-on: ubuntu-latest
    if: always()
    steps:
      - name: Check all jobs succeeded
        run: |
          if [[ "${{ needs.backend-test.result }}" != "success" || \
                "${{ needs.frontend-lint.result }}" != "success" ]]; then
            echo "One or more CI jobs failed."
            exit 1
          fi
          echo "All CI checks passed."
